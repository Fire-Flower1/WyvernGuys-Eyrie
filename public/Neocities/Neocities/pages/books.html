<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <style>
      .flex-container{
        margin: 20px;
      }
      .maintext{
        text-align: center;
      }
      .CenterBody{
        flex: 1;
        padding-top: 0px;
      }
      .sideright{
        width: 300px;
        
      }
      .bookdesc{
        width: 250px;
        padding: 10px;
        border-style: solid;
        border-radius: 5px;
        border-color: 7b55e1;
        color: #7b55e1;
      }
      .book{
        height: 200px;
      }
      .topbanner{
        display: inline-grid;
        justify-self: center;
        width: 80%;
        overflow: hidden;
        border-style: solid;
        border-radius: 5px;
        border-color: #7b55e1;
        color: #49E697;
        white-space: nowrap;
      }
      .scrollingstuff{
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding-left: 100%;
        animation: scroll-left 12s linear infinite;
        
      }
      @keyframes scroll-left{
        0% {
          transform: translateX(0%);
        }
        100%{
          transform: translateX(-180%);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="titlediv"><h1>Wyvern's Book Stash</h1></div>
      <div class="topbanner">
        <div class="scrollingstuff">
            <img src="/img_assets/books/book.gif" width="40">
            <span>Hello, This is my book corner :)</span>
            <img src="/img_assets/books/book.gif" width="40">
        </div>
      </div>
      <div class="flex-container">
        <div class="CenterBody">
          <div class="maintext">
            <h3>Books I've Read</h3>
            <p>
              <figure>
                <img class="book" src="/img_assets/books/Antimemetics.jpg">
                <details>
                  <summary>My Thoughts</summary>
                  <p class="bookdesc">I thought it was a really good book, but it wasn't as scary as I was hoping for. As an SCP nerd though, I really like to see writer like QNTM writing their own books.</p>
                </details>
              </figure>
              <figure>
                <img class="book" src="/img_assets/books/annihilation.jpg">
                <details>
                  <summary>My Thoughts</summary>
                  <p class="bookdesc">
                    It was a little but of a slow read, and a good bit went over my head, but all in all it was a thought provoking book that I thought was pretty alright. I have heard the movie is not good, however.
                  </p>
                </details>
              </figure>
            </p>
          </div>
        </div>
        <div class="sideleft">
            <h3>Book I'm reading</h3>
            <figure>
          <img class="book" src="/img_assets/books/strange_pictures.jpg">
              <details>
              <summary>Wait what? Why?</summary>
              <p class="bookdesc" style="width: auto;">I currently have a mild horror obsession, and pinterest recommended it.</p>
          </details>
        </div>
      </div>
      <div class="maintext">
        <h3>Books I want to read</h3>
        <figure>
          <img class="book" src="/img_assets/books/themartian.jpg">
            <details>
            <summary>Why?</summary>
            <p class="bookdesc">I watched project hail mary because of one of my teachers, and now I feel the need to consume more Andy Weir media. My pinterest is also flooded with The Martian.</p>
          </details>
        </figure>
      </div>
    </div>
    <br>
    <br>
    <a href="https://wyvernguy.neocities.org/"><img src="/img_assets/buttons/ButtonAnim.gif"></a>
    <br>
  </body>
</html>
